<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example Web Site</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #1a3a5c, #0d1f33);
        color: #e8eef7;
      }

      main {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      p {
        line-height: 1.6;
        opacity: 0.85;
      }

      a {
        color: #7ab4e0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Example Web Site</h1>
      <p>
        This page is served locally from the template's <code>public/</code> directory.
        It demonstrates navigation from the startup screen into embedded web content.
      </p>
      <p><a href="../index.html">← Back to startup screen</a></p>
    </main>
  </body>
</html>
