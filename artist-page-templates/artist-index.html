<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noai, noimageai" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>{{ARTIST_NAME}}</title>
    <script src="./js/site-app-mode.js"></script>
    <link rel="stylesheet" href="./css/site.css" />
  </head>
  <body data-site-base="./">
    <main class="site-shell">
      <header class="site-header">
        <div class="artist-identity">
          {{ARTIST_PHOTO_HTML}}
          <div class="artist-copy">
            <h1 class="artist-name">{{ARTIST_NAME}}</h1>
            <div class="artist-bio markdown-body">{{ARTIST_BIO}}</div>
          </div>
        </div>
        {{SOCIAL_LINKS_HTML}}
      </header>

      <section class="songs-section" aria-label="Songs">
        <h2 class="section-title">Songs</h2>
        <div class="song-grid">{{SONG_CARDS_HTML}}</div>
      </section>
    </main>

    {{PLAYER_FOOTER_HTML}}

    <script type="application/json" id="site-playlist">{{PLAYLIST_JSON}}</script>
    <script src="./js/hls.light.min.js"></script>
    <script src="./js/site-player.js"></script>
  </body>
</html>
