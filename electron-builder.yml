appId: com.sawyerhouse.song-pages
productName: Song Pages
copyright: Copyright © Ben Sawyer

directories:
  output: build
  # Icons live here (icon.icns, icon.ico); installers go to build/.
  buildResources: build-resources

files:
  - dist/**/*
  - electron/**/*
  - compiler/**/*
  - artist-page-templates/**/*
  - shared/**/*
  - images/song-pages-round-logo.png
  - node_modules/hls.js/**/*
  - package.json

# Exclude dev-only vite middleware from packaged compiler output.
asarUnpack:
  - "**/better_sqlite3.node"

# compiler-dist is emitted under electron/ by `npm run build:compiler`.

mac:
  category: public.app-category.music
  icon: images/song-pages-round-logo.png
  extendInfo:
    CFBundleDisplayName: Song Pages
    CFBundleName: Song Pages
  target:
    - dmg

win:
  # No spaces in the exe name — avoids broken Start Menu shortcuts on some Windows builds.
  executableName: SongPages
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64
    - target: zip
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: Song Pages
  artifactName: SongPages-Setup-${version}.${ext}

portable:
  artifactName: SongPages-Portable-${version}.${ext}

linux:
  target:
    - AppImage
