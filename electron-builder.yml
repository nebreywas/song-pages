appId: com.sawyerhouse.song-pages
productName: Song Pages
copyright: Copyright © Ben Sawyer

directories:
  output: build
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - compiler/**/*
  - artist-page-templates/**/*
  - shared/**/*
  - node_modules/hls.js/**/*
  - package.json

asarUnpack:
  - "**/*.node"

mac:
  category: public.app-category.music
  target:
    - dmg

win:
  target:
    - nsis

linux:
  target:
    - AppImage
