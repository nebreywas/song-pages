<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>About Song Pages</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        background: #323232;
        color: #f2f2f2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem 1rem 1.25rem;
        text-align: center;
        -webkit-user-select: none;
        user-select: none;
      }

      #logo {
        width: 96px;
        height: 96px;
        margin-bottom: 0.85rem;
        border-radius: 50%;
      }

      h1 {
        font-size: 1.15rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      .version {
        font-size: 0.78rem;
        color: #b0b0b0;
        margin-bottom: 1rem;
      }

      .copyright {
        font-size: 0.78rem;
        color: #c8c8c8;
        line-height: 1.35;
        margin-bottom: 1rem;
      }

      .close-btn {
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
        color: #f2f2f2;
        border-radius: 6px;
        padding: 0.35rem 1.1rem;
        font-size: 0.82rem;
        cursor: pointer;
      }

      .close-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }
    </style>
  </head>
  <body>
    <img id="logo" alt="" width="96" height="96" />
    <h1>Song Pages</h1>
    <p class="version" id="version"></p>
    <p class="copyright">Song Pages © Ben Sawyer, 2026.</p>
    <button type="button" class="close-btn" id="close">Close</button>
    <script>
      document.getElementById('close').addEventListener('click', () => window.close());
    </script>
  </body>
</html>
